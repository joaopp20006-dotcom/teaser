<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneUp OS — Teaser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Press+Start+2P&display=swap');

:root{
  --g:#8AFF00;
  --g2:rgba(138,255,0,.55);
  --g3:rgba(138,255,0,.12);
  --dim:rgba(138,255,0,.06);
  --fw:390px;
}

*,*::before,*::after{ margin:0;padding:0;box-sizing:border-box; }

html,body{
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* ── 9:16 frame ── */
#stage{
  position:relative;
  width:min(100vw, 56.25vh);
  height:min(100vh, 177.78vw);
  background:#000;
  overflow:hidden;
}

canvas#particles{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:0;
}

/* scanlines */
.scanlines{
  position:absolute;inset:0;z-index:50;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,.18) 3px, rgba(0,0,0,.18) 4px
  );
  pointer-events:none;
  mix-blend-mode:multiply;
}

/* vignette */
.vignette{
  position:absolute;inset:0;z-index:51;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.85) 100%);
  pointer-events:none;
}

/* flash overlay */
#flash{
  position:absolute;inset:0;z-index:60;
  background:var(--g);
  opacity:0;pointer-events:none;
}

/* HUD corner brackets */
.hud-corner{
  position:absolute;width:32px;height:32px;z-index:52;
  opacity:.55;
}
.hud-corner::before,.hud-corner::after{
  content:'';position:absolute;background:var(--g);
  box-shadow:0 0 6px var(--g);
}
.hud-corner::before{width:2px;height:20px;}
.hud-corner::after{width:20px;height:2px;}
.hud-corner.tl{top:18px;left:18px;}
.hud-corner.tr{top:18px;right:18px;transform:scaleX(-1);}
.hud-corner.bl{bottom:18px;left:18px;transform:scaleY(-1);}
.hud-corner.br{bottom:18px;right:18px;transform:scale(-1);}

/* HUD top bar */
.hud-bar{
  position:absolute;top:0;left:0;right:0;z-index:52;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--g),transparent);
  opacity:.4;
}

/* ─────────────────────── SCENE WRAPPER ─────────────────────── */
.scene{
  position:absolute;inset:0;z-index:10;
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
}
.scene.fade-out{
  display:flex;
  opacity:0;
  transition:opacity .4s ease;
}

/* ─────────────────────── SCENE 1 — BOOT ─────────────────────── */
#s1{
  align-items:flex-start;
  padding: 0 calc(var(--fw) * 0.1);
  justify-content:center;
  gap:0;
}

.os-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(13px, calc(var(--fw) * 0.052), 22px);
  color:var(--g);
  text-shadow:0 0 10px var(--g),0 0 28px var(--g2);
  letter-spacing:.12em;
  white-space:nowrap;
}

.boot-sub{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(10px, calc(var(--fw) * 0.038), 16px);
  color:rgba(138,255,0,.7);
  letter-spacing:.08em;
  margin-top:.75em;
}

.cursor{
  display:inline-block;
  width:.55em;height:.9em;
  background:var(--g);
  vertical-align:middle;
  margin-left:2px;
  animation:blink .8s step-end infinite;
  box-shadow:0 0 6px var(--g);
}
@keyframes blink{50%{opacity:0;}}

/* ─────────────────────── SCENE 2 — DIAG ─────────────────────── */
#s2{
  align-items:flex-start;
  padding: 0 calc(var(--fw) * 0.1);
  gap: .8em;
}

.diag-header{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px, calc(var(--fw) * 0.028), 12px);
  color:rgba(138,255,0,.4);
  letter-spacing:.2em;
  margin-bottom:.3em;
  text-transform:uppercase;
}

.diag-line{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(11px, calc(var(--fw) * 0.042), 17px);
  color:rgba(138,255,0,.0);
  display:flex;align-items:center;gap:.7em;
  letter-spacing:.04em;
  transition:color .2s ease, text-shadow .2s ease;
  white-space:nowrap;
}
.diag-line.on{
  color:rgba(138,255,0,.9);
  text-shadow:0 0 8px rgba(138,255,0,.5);
}
.check{
  display:inline-block;
  font-family:'Share Tech Mono',monospace;
  font-size:1em;
  color:var(--g);
  text-shadow:0 0 8px var(--g),0 0 20px var(--g);
  opacity:0;
  transform:scale(.4);
  transition:opacity .25s ease,transform .25s cubic-bezier(.34,1.62,.64,1);
}
.diag-line.on .check{opacity:1;transform:scale(1);}

.diag-divider{
  width:100%;
  height:1px;
  background:linear-gradient(90deg,var(--g),transparent);
  opacity:.2;
  margin: .2em 0;
}

/* ─────────────────────── SCENE 3 — LOGO ─────────────────────── */
#s3{
  gap:0;
  flex-direction:column;
  align-items:center;
}

#logo-img{
  width:min(280px, calc(var(--fw) * 0.58));
  image-rendering:pixelated;
  opacity:0;
  filter:
    drop-shadow(0 0 12px rgba(138,255,0,.7))
    drop-shadow(0 0 40px rgba(138,255,0,.35));
  transition:opacity .6s ease,filter .6s ease;
}
#logo-img.show{opacity:1;}
#logo-img.glitch{animation:glitch .5s steps(2,end) forwards;}
@keyframes glitch{
  0%  {transform:translate(0,0) skewX(0);}
  15% {transform:translate(-4px,2px) skewX(-5deg);filter:drop-shadow(4px 0 #f0f) drop-shadow(-4px 0 #0ff);}
  30% {transform:translate(3px,-1px) skewX(3deg);}
  45% {transform:translate(-3px,1px) skewX(-2deg);filter:drop-shadow(2px 0 #0ff) drop-shadow(-2px 0 #f0f);}
  60% {transform:translate(2px,2px) skewX(4deg);}
  75% {transform:translate(-1px,-2px) skewX(-1deg);}
  100%{transform:translate(0,0) skewX(0);filter:drop-shadow(0 0 12px rgba(138,255,0,.7)) drop-shadow(0 0 40px rgba(138,255,0,.35));}
}
@keyframes logoPulse{
  0%,100%{filter:drop-shadow(0 0 12px rgba(138,255,0,.7)) drop-shadow(0 0 40px rgba(138,255,0,.35));}
  50%{filter:drop-shadow(0 0 22px rgba(138,255,0,1)) drop-shadow(0 0 70px rgba(138,255,0,.65));}
}

.status-group{
  display:flex;flex-direction:column;align-items:center;
  margin-top:calc(var(--fw) * 0.07);
  gap:.35em;
  opacity:0;
  transition:opacity .5s ease;
}
.status-group.show{opacity:1;}

.status-label{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(9px, calc(var(--fw) * 0.035), 14px);
  color:rgba(138,255,0,.45);
  letter-spacing:.45em;
}
.status-ready{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(20px, calc(var(--fw) * 0.085), 38px);
  color:var(--g);
  letter-spacing:.15em;
  text-shadow:
    0 0 14px var(--g),
    0 0 40px rgba(138,255,0,.7),
    0 0 90px rgba(138,255,0,.4);
  animation:readyPulse 1.4s ease-in-out infinite;
}
@keyframes readyPulse{
  0%,100%{text-shadow:0 0 14px var(--g),0 0 40px rgba(138,255,0,.7),0 0 90px rgba(138,255,0,.4);}
  50%{text-shadow:0 0 24px var(--g),0 0 70px rgba(138,255,0,1),0 0 140px rgba(138,255,0,.6);}
}

/* ─────────────────────── SCENE 4 — LOADING ─────────────────────── */
#s4{
  gap:0;
  padding:0 calc(var(--fw) * 0.1);
}

.load-header{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px, calc(var(--fw) * 0.024), 11px);
  color:rgba(138,255,0,.35);
  letter-spacing:.28em;
  margin-bottom:2em;
  text-align:center;
  width:100%;
}

.bar-track{
  width:100%;
  height:18px;
  border:2px solid rgba(138,255,0,.3);
  position:relative;
  background:rgba(138,255,0,.03);
  box-shadow:0 0 10px rgba(138,255,0,.1);
}
/* pixel tick marks */
.bar-track::before{
  content:'';
  position:absolute;inset:3px;
  background:repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 9px,
    rgba(0,0,0,.5) 9px, rgba(0,0,0,.5) 10px
  );
  z-index:0;
}
.bar-fill{
  position:absolute;top:0;left:0;bottom:0;
  width:0%;
  background:var(--g);
  box-shadow:0 0 12px var(--g), 0 0 28px rgba(138,255,0,.5);
  transition:width .08s linear;
  z-index:1;
  image-rendering:pixelated;
}
/* leading edge glow */
.bar-fill::after{
  content:'';
  position:absolute;right:0;top:0;bottom:0;
  width:12px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7));
}

.bar-pct{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(16px, calc(var(--fw) * 0.065), 30px);
  color:var(--g);
  text-shadow:0 0 10px var(--g),0 0 28px var(--g2);
  margin-top:1.2em;
  letter-spacing:.1em;
  text-align:center;
  width:100%;
  transition:text-shadow .1s;
}

/* ─────────────────────── SCENE 5 — LAUNCH ─────────────────────── */
#s5{
  gap:0;
  flex-direction:column;
  align-items:center;
}

#final-logo{
  width:min(230px, calc(var(--fw) * 0.48));
  image-rendering:pixelated;
  filter:
    drop-shadow(0 0 12px rgba(138,255,0,.7))
    drop-shadow(0 0 40px rgba(138,255,0,.35));
  animation:logoPulse 2.4s ease-in-out infinite;
  opacity:0;
  transition:opacity .7s ease;
}
#final-logo.show{opacity:1;}

.launch-date{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(10px, calc(var(--fw) * 0.038), 16px);
  color:rgba(138,255,0,.55);
  letter-spacing:.35em;
  margin-top:calc(var(--fw) * 0.08);
  opacity:0;
  transition:opacity .5s ease;
}
.launch-date.show{opacity:1;}

.launch-tagline{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(10px, calc(var(--fw) * 0.038), 17px);
  color:var(--g);
  text-shadow:0 0 8px var(--g),0 0 22px var(--g2);
  letter-spacing:.14em;
  margin-top:.7em;
  text-align:center;
  max-width:82%;
  line-height:1.7;
  opacity:0;
  transition:opacity .5s ease;
}
.launch-tagline.show{opacity:1;}

.launch-soon{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px, calc(var(--fw) * 0.032), 14px);
  color:rgba(138,255,0,.5);
  letter-spacing:.55em;
  margin-top:.9em;
  opacity:0;
  transition:opacity .6s ease;
  text-shadow:0 0 10px var(--g);
}
.launch-soon.show{opacity:1;}

</style>
</head>

  <canvas id="particles"></canvas>

  <!-- SCENE 1: BOOT -->

  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div id="flash"></div>
</div>

const logoSrc = "data:image/png;base64," + LOGO_B64;
document.getElementById('logo-img').src = logoSrc;
document.getElementById('final-logo').src = logoSrc;

// ── Resize: update --fw and canvas ──
const stage = document.getElementById('stage');
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
let W, H;
function resize(){
  const r = stage.getBoundingClientRect();
  W = canvas.width  = Math.round(r.width);
  H = canvas.height = Math.round(r.height);
  document.documentElement.style.setProperty('--fw', r.width + 'px');
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────── PARTICLES ───────────────────────
class Dot{
  constructor(){ this.reset(true); }
  reset(rand){
    this.x = Math.random() * W;
    this.y = rand ? Math.random() * H : H + 4;
    this.s = [2,2,3,4][Math.floor(Math.random()*4)];
    this.vy = -(0.1 + Math.random() * 0.25);
    this.vx = (Math.random()-.5) * 0.15;
    this.a  = 0.08 + Math.random() * 0.38;
    this.tw = Math.random() * Math.PI * 2;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    this.tw += 0.025;
    if(this.y < -6) this.reset(false);
  }
  draw(){
    const a = this.a * (.55 + .45 * Math.sin(this.tw));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#8AFF00';
    ctx.shadowColor = '#8AFF00';
    ctx.shadowBlur = 4;
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.s, this.s);
  }
}
const dots = Array.from({length:55}, () => new Dot());

function tickParticles(){
  ctx.clearRect(0,0,W,H);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  for(const d of dots){ d.update(); d.draw(); }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  requestAnimationFrame(tickParticles);
}
tickParticles();

// ─────────────────────── AUDIO BEEP ───────────────────────
function beep(freq=880, dur=0.07, vol=0.08){
  try{
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  }catch(e){}
}
function checkBeep(){ beep(1100, 0.06, 0.07); }
function bootBeep(){ beep(660, 0.14, 0.09); }
function flashBeep(){ beep(2200, 0.1, 0.1); }

// ─────────────────────── HELPERS ───────────────────────
const scenes = {};
['s1','s2','s3','s4','s5'].forEach(id => scenes[id] = document.getElementById(id));

function showScene(id){
  Object.values(scenes).forEach(s => {
    s.style.display = 'none';
  });
  const el = scenes[id];
  el.style.display = 'flex';
}
function hideAll(){
  Object.values(scenes).forEach(s => {
    s.style.display = 'none';
  });
}

function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

function typeInto(el, text, speed=55){
  return new Promise(resolve => {
    el.textContent = '';
    let i = 0;
    function step(){
      el.textContent = text.slice(0, i);
      if(i < text.length){ i++; setTimeout(step, speed); }
      else resolve();
    }
    step();
  });
}

function flashScreen(duration=280){
  const f = document.getElementById('flash');
  f.style.transition = 'none';
  f.style.opacity = '0.6';
  flashBeep();
  return new Promise(r => {
    setTimeout(()=>{
      f.style.transition = `opacity ${duration}ms ease`;
      f.style.opacity = '0';
      setTimeout(r, duration);
    }, 60);
  });
}

// ─────────────────────── SCENE 1 — BOOT (~0s → 3s) ───────────────────────
async function runScene1(){
  showScene('s1');
  const title = document.getElementById('s1-title');
  const sub   = document.getElementById('s1-sub');
  title.textContent = '';
  sub.textContent   = '';

  await delay(600);
  bootBeep();
  await typeInto(title, 'ONEUP OS v1.0', 90);
  await delay(500);

  sub.innerHTML = 'Inicializando sistema...<span class="cursor"></span>';
  await delay(1800);
}

// ─────────────────────── SCENE 2 — DIAG (~3s → 7.5s) ───────────────────────
async function runScene2(){
  ['d1','d2','d3','d4','d5'].forEach(id => {
    document.getElementById(id).classList.remove('on');
  });

  showScene('s2');
  await delay(400);

  const lines = ['d1','d2','d3','d4','d5'];
  for(const id of lines){
    await delay(550);
    document.getElementById(id).classList.add('on');
    checkBeep();
  }
  await delay(1200);
}

// ─────────────────────── SCENE 3 — LOGO STATUS (~7.5s → 12s) ───────────────────────
async function runScene3(){
  const logoImg     = document.getElementById('logo-img');
  const statusGroup = document.getElementById('status-group');

  logoImg.style.transition = 'none';
  logoImg.style.animation = 'none';
  logoImg.classList.remove('show','glitch');
  statusGroup.style.transition = 'none';
  statusGroup.classList.remove('show');
  void logoImg.offsetWidth;

  showScene('s3');
  await delay(400);

  logoImg.style.transition = '';
  statusGroup.style.transition = '';

  logoImg.classList.add('glitch');
  beep(440, 0.25, 0.08);
  await delay(180);
  logoImg.classList.add('show');
  await delay(900);

  logoImg.style.animation = 'logoPulse 2s ease-in-out infinite';

  statusGroup.classList.add('show');
  beep(1320, 0.12, 0.08);
  await delay(3000);
}

// ─────────────────────── SCENE 4 — LOADING BAR (~12s → 15.5s) ───────────────────────
async function runScene4(){
  const fill = document.getElementById('bar-fill');
  const pct  = document.getElementById('bar-pct');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  pct.textContent = '0%';

  showScene('s4');
  await delay(500);

  const steps = [
    {w:12,  t:300},
    {w:35,  t:400},
    {w:68,  t:500},
    {w:90,  t:350},
    {w:100, t:400},
  ];
  let cur = 0;
  for(const step of steps){
    fill.style.transition = `width ${step.t}ms linear`;
    fill.style.width = step.w + '%';
    pct.textContent = step.w + '%';
    beep(660 + cur * 110, 0.06, 0.06);
    await delay(step.t + 120);
    cur++;
  }

  await delay(500);
  await flashScreen(400);
  await delay(400);
}

// ─────────────────────── SCENE 5 — LAUNCH (~15.5s → 20s) ───────────────────────
async function runScene5(){
  const flogo  = document.getElementById('final-logo');
  const date   = document.getElementById('launch-date');
  const tag    = document.getElementById('launch-tagline');
  const soon   = document.getElementById('launch-soon');

  [flogo, date, tag, soon].forEach(el => {
    el.style.transition = 'none';
    el.classList.remove('show');
    void el.offsetWidth;
  });

  showScene('s5');
  await delay(400);

  [flogo, date, tag, soon].forEach(el => { el.style.transition = ''; });

  flogo.classList.add('show');
  beep(880, 0.15, 0.09);

  await delay(1000);
  date.classList.add('show');

  await delay(700);
  tag.classList.add('show');
  beep(1100, 0.1, 0.07);

  await delay(800);
  soon.classList.add('show');
  beep(1320, 0.12, 0.06);

  // hold on final frame
  await delay(3500);
}

// ─────────────────────── MASTER SEQUENCE ───────────────────────
async function run(){
  hideAll();
  await delay(200);

  await runScene1();   // ~3s
  await runScene2();   // ~4.5s
  await runScene3();   // ~4.5s
  await runScene4();   // ~3.5s
  await runScene5();   // ~6.4s

  // brief black before loop
  hideAll();
  await delay(1200);
  run();
}

run();
